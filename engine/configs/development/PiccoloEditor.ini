GlobalParticleRes=asset/global/particle.global.json
JoltAssetFolder=jolt-asset
; Path tracing knobs (plan Task 3 Step 4). These keys are parsed by
; ConfigManager + uploaded into PathTracingFrameData (max_bounces).
; Unset/garbled values silently fall back to the C++ defaults
; (8 bounces, intensity 100, sun half-angle 0.53 deg, 1 sample/frame).
PathTracingMaxBounces=8
PathTracingMaxPathIntensity=100
PathTracingMaxSamplesPerFrame=1
PathTracingDirectionalAngleDeg=0.53
; Tier-1 performance budget (plan 2026-07-12 §0). Hard numbers gate tier
; acceptance: any regression beyond the threshold is a tier-1 merge blocker.
; Defaults below match the RTX 3060 floor (30 FPS / 1.5 GB / 1.5s). Promote
; these when targeting a 4070 host (60 / 2048 / 1.0).
PathTracingFpsBudget=30
PathTracingVramBudgetMb=1500
PathTracingConvergenceBudgetS=1.5