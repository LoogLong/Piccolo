name: Build Windows

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    # windows 10 with latest image
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Debug, Release]
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: 'true'

      - name: Configure
        run: cmake -S . -B build

      - name: Build PiccoloEditor
        run: cmake --build build --config ${{ matrix.configuration }} --target PiccoloEditor --parallel

      - name: D3D12 backend smoke
        if: matrix.configuration == 'Debug'
        shell: pwsh
        run: ./scripts/tests/render_backend/smoke_backend_boot.ps1 -Configuration Debug
